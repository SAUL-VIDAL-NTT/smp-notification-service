# governance-standard: v1.0.0
name: "CD - UAT"
run-name: "CD UAT ${{ inputs.version }}"
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true
        default: ''

jobs:
  CD-UAT:
    uses: ExampleCorppe-platform-org/dso-k8s-reusable/.github/workflows/_cd-aks-uat.yml@v1 # NOSONAR - internal reusable workflow
    permissions:
      contents: write
      id-token: write
      attestations: write
      issues: write
      actions: write
      security-events: read
      deployments: write
    with:
      application: smp
      component-name: smp-notification
      component-type: backend
      build-type: java-mvn
      helm-chart: microservice
      version: ${{ inputs.version }}
    secrets: inherit # NOSONAR - dynamic app secrets
