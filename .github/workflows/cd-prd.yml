# governance-standard: v1.0.0
name: "CD - PRD"
run-name: "CD PRD [${{ inputs.oc }}] ${{ inputs.version }}"
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true
        default: ''
      oc:
        description: 'Orden de cambio (OC)'
        required: false

jobs:
  CD-PRD:
    uses: ExampleCorppe-platform-org/dso-k8s-reusable/.github/workflows/_cd-aks-prd.yml@v1 # NOSONAR - internal reusable workflow
    permissions:
      contents: write
      id-token: write
      attestations: write
      issues: write
      security-events: read
      actions: write
      deployments: write
    with:
      application: smp
      component-name: smp-notification
      component-type: backend
      build-type: java-mvn
      helm-chart: microservice
      version: ${{ inputs.version }}
      oc: ${{ inputs.oc }}
    secrets: inherit # NOSONAR - dynamic app secrets
