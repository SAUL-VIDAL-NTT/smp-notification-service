spring:
  application:
    name: smp-notification-service
  profiles:
    group:
      dev:
        - cd
      uat:
        - cd
      prd:
        - cd
      test:
        - ci
    active: ${PROFILE:dev}
  jmx:
    enabled: false
  main:
    lazy-initialization: false
    allow-bean-definition-overriding: true
  config:
    location: file://./src/main/resources/application.yaml
  reactor:
    debug-agent:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
    enabled: false
  swagger-ui:
    enabled: false
  packages-to-scan: com.example.smp

# Server
server:
  port: 8080
  max-http-request-header-size: 25KB

# Metrics related configurations
management:
  endpoint:
    health:
      enabled: true
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,metric,prometheus
      base-path: "/"
      path-mapping:
        metrics: metric
        prometheus: metrics
  prometheus:
    metrics:
      export:
        enabled: true

# Performance Spring
logging:
  level:
    root: ${LOG_LEVEL:ERROR}
    org.springframework.web: ${LOG_LEVEL:ERROR}
    com.netflix.config.sources.URLConfigurationSource: ${LOG_LEVEL:ERROR}
