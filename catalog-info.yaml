  tags:
    - language:java
    - java-version:21
    - framework:spring
    - spring-version:3-3-11
  annotations:
    backstage.io/techdocs-ref: dir:./
spec:
  type: service
  lifecycle: production
  owner: group:default/smp-team
  system: smp
  providesApis:
    - smp-notification-openapi
